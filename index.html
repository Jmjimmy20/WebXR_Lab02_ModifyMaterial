<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>webxr-lab02-modifymaterial</title>
</head>
<body>

  <!-- Control Panel-->
  <div id="panel">
    <h2>Material</h2>

    <div class="control">
      <label for="color-input">Color</label>
      <input type="color" id="color-input" value="#6c63ff" />
    </div>

    <div class="control">
      <div class="control-row">
        <label for="roughness-input">Roughness</label>
        <span id="roughness-value">0.30</span>
      </div>
      <input type="range" id="roughness-input" min="0" max="1" step="0.01" value="0,3" />
    </div>

    <div class="control">
      <div class="control-row">
        <label for="metalness-input">Metalness</label>
        <span id="metalness-value">0.20</span>
      </div>
      <input type="range" id="metalness-input" min="0" max="1" step="0.01" value="0.2" />
    </div>

    <div class="control">
      <button id="wireframe-btn">Wireframe: OFF</button>
    </div>

  </div>
    
  <script type="module" src="/src/main.js"></script>
</body>
</html>
